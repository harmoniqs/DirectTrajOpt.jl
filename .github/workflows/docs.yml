name: Documentation
on:
  pull_request:
  push:
    branches:
      - main
    tags: ["*"]

  repository_dispatch:
    types: [tagbot-release-created]

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    # Bound the build+deploy. makedocs is ~5 min; the rest is the deploydocs
    # gh-pages push. Without this, a transient deploy/git-push stall runs to the
    # 6h default and blocks the Documentation concurrency group (observed
    # 2026-06-08: a deploy hung 90+ min, queueing the next main build behind it).
    timeout-minutes: 30
    permissions:
      contents: write
      statuses: write
    env:
      DOC_TEMPLATE_VERSION: "v0.7.0" # Change this to the specific tag version you want
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
      - uses: julia-actions/cache@v3
      - name: Use Documentation Template
        run: |
          ./docs/get_docs_utils.sh ${{ env.DOC_TEMPLATE_VERSION }}
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v7
        with:
          name: documentation-build
          path: docs/build/
          retention-days: 1
      - run: |
          julia --project=docs -e '
            using Documenter: DocMeta, doctest
            using DirectTrajOpt
            DocMeta.setdocmeta!(DirectTrajOpt, :DocTestSetup, :(using DirectTrajOpt); recursive=true)
            doctest(DirectTrajOpt)'

  tagbot-dispatch:
    name: Dispatch on TagBot Release
    runs-on: ubuntu-latest
    needs: docs
    if: github.event_name == 'repository_dispatch'
    steps:
      - name: Dispatch PiccoloMultiDocs workflow
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: harmoniqs/PiccoloMultiDocs.jl
          event-type: rebuild-docs

  tag-push-dispatch:
    name: Dispatch on Tag Push
    runs-on: ubuntu-latest
    needs: docs
    if: github.ref_type == 'tag'
    steps:
      - name: Dispatch PiccoloMultiDocs workflow
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: harmoniqs/PiccoloMultiDocs.jl
          event-type: rebuild-docs
