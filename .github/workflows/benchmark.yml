name: Benchmarks
on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'src/**'
      - 'benchmark/**'
      - '.github/workflows/benchmark.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  benchmark:
    name: Benchmark suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      # contents: write so github-action-benchmark can auto-push the time-series
      # to gh-pages (gated to main below); pull-requests: write for its
      # regression alert comments.
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
          arch: x64

      - uses: julia-actions/cache@v2

      - name: Instantiate benchmark environment
        run: julia --project=benchmark -e 'using Pkg; Pkg.instantiate()'

      - name: Run timing benchmarks only
        env:
          BENCHMARK_RUNNER: github-actions
        run: |
          julia --project=benchmark -t auto -e '
            using TestItemRunner
            # Run only the timing testitems (benchmark/benchmarks.jl). The
            # alloc-profile (benchmark/alloc_profile.jl) and convergence
            # (benchmark/convergence/) suites each have their own workflow +
            # project env (alloc-profile.yml, benchmark-convergence.yml); running
            # them here would use the wrong env and/or blow this suite''s 60-min
            # budget.
            TestItemRunner.run_tests("benchmark/";
                filter = ti -> !occursin("alloc_profile", ti.filename) &&
                               !occursin("/convergence/", ti.filename))
          '

      - name: Generate benchmark report
        if: always()
        run: julia --project=benchmark benchmark/report.jl

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.event.pull_request.number || github.ref_name }}-${{ github.sha }}
          path: benchmark/results/
          retention-days: 90

      # Publish to /bench on gh-pages (per-release time-series chart + regression
      # alerts), mirroring CuQuantum.jl. This workflow only runs on v* tags and
      # PRs (see `on:`); save-data-file / auto-push are gated to tag refs so PR
      # runs render a comparison comment without polluting the published series.
      # (The series is therefore indexed by release tag, not per-commit.)
      - name: Publish benchmark to gh-pages
        if: success() && hashFiles('benchmark/results/bench.json') != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: DirectTrajOpt.jl benchmarks
          tool: customSmallerIsBetter
          output-file-path: benchmark/results/bench.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: false
          save-data-file: ${{ startsWith(github.ref, 'refs/tags/v') }}
          auto-push: ${{ startsWith(github.ref, 'refs/tags/v') }}
